version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: career-ai-agent


    env_file:
      - .env

    depends_on:
      - redis

  redis:
    image: redis:7-alpine

    container_name: redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

volumes:
  redis-data: